<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Reversi</title>
    <script src="/theme.js"></script>
    <link rel="stylesheet" href="/theme.css" />
    <link rel="stylesheet" href="../site-header.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="site-header">
        <h1><a href="/">Kirk D. Brown</a></h1>
        <div class="header-actions">
            <a href="https://www.linkedin.com/in/kirk-d-brown/" aria-label="LinkedIn"><svg viewBox="0 0 24 24" fill="#0A66C2" aria-hidden="true"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg></a>
            <button type="button" class="theme-toggle" aria-label="Toggle dark mode">
                <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            </button>
        </div>
    </header>

    <div class="container">
        <h2>Infinite Reversi</h2>

        <div class="controls">
            <div class="game-mode">
                <label>
                    <input type="radio" name="mode" value="pvp" checked> Player vs Player
                </label>
                <label>
                    <input type="radio" name="mode" value="ai"> Player vs AI
                </label>
            </div>

            <div class="buttons">
                <button id="newGame">New Game</button>
                <button id="undo">Undo</button>
            </div>
        </div>

        <div class="game-info">
            <div class="score">
                <div class="player-score">
                    <span class="disc black"></span>
                    <span>Black: <span id="blackScore">2</span></span>
                </div>
                <div class="player-score">
                    <span class="disc white"></span>
                    <span>White: <span id="whiteScore">2</span></span>
                </div>
            </div>
            <div id="currentPlayer">Current Player: Black</div>
            <div id="gameStatus"></div>
        </div>

        <div class="board-container">
            <div id="board"></div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
