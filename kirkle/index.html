    <style>
      /* Drive the built app's own theme tokens from our data-theme switch,
         overriding its :root defaults and prefers-color-scheme media query. */
      html[data-theme='dark'] {
        --color-background: #14181f;
        --color-background-soft: #1e242e;
        --color-background-mute: #262e39;
        --color-heading: #e4e7eb;
        --color-text: #c3c9d1;
        --color-border: #333c48;
      }
      html[data-theme='light'] {
        --color-background: #ffffff;
        --color-background-soft: #f8f8f8;
        --color-background-mute: #f2f2f2;
        --color-heading: #2c3e50;
        --color-text: #2c3e50;
        --color-border: rgba(60, 60, 60, 0.12);
      }

      body {
        margin: 0;
        padding: 0;
      }

      /* Scoped to .site-header: the Vue app renders its own <header>. */
      .site-header {
        flex: none;
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        margin: 0;
        padding: 1rem 1.5rem;
        background-color: var(--header-bg);
        font-family: Arial, sans-serif;
        font-size: 16px;
        line-height: normal;
        color: var(--header-fg);
      }

      /* Restore browser defaults the app's CSS reset strips. */
      .site-header h1 {
        margin: 0.67em 0;
        font-size: 2em;
        font-weight: 400;
        text-align: left;
        color: var(--header-fg);
      }

      .site-header a {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        color: var(--header-fg);
      }

      /* The reset sets font-weight on *, so weight must land on the <a>, not the <h1>. */
      .site-header h1 a {
        text-decoration: underline;
        font-weight: 400;
      }

      .site-header a:hover {
        background-color: transparent;
      }

      .site-header a svg {
        width: 18px;
        height: 18px;
        flex: none;
      }
    </style>
  </head>
